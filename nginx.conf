# /etc/nginx/sites-available/portfolio
# Symlink: ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/

upstream portfolio_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name anandevops.xyz www.anandevops.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anandevops.xyz www.anandevops.xyz;

    # ── SSL (Certbot / Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/anandevops.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anandevops.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── Rate Limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=portfolio:10m rate=30r/m;
    limit_req zone=portfolio burst=60 nodelay;

    # ── Static Files (served by Nginx directly, bypassing Node) ─
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @node;
    }

    # ── Proxy to Node.js app ─────────────────────────────────────
    location / {
        proxy_pass         http://portfolio_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ── Named location fallback ───────────────────────────────────
    location @node {
        proxy_pass http://portfolio_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check endpoint (no rate limit) ────────────────────
    location /health {
        proxy_pass http://portfolio_app/health;
        access_log off;
    }

    # ── Block common attack paths ─────────────────────────────────
    location ~ /\. { deny all; access_log off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /favicon.ico { access_log off; log_not_found off; }
}
