groups:
  - name: instance_alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance DOWN"
          description: "{{ $labels.job }} target {{ $labels.instance }} is down."

      - alert: PortfolioAppDown
        expr: absent(container_memory_usage_bytes{name="portfolio-app"})
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Portfolio App is DOWN"
          description: "The portfolio-app container has stopped."

  - name: cpu_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU Usage"
          description: "CPU above 80%. Value {{ $value | printf \"%.1f\" }}%"

  - name: memory_alerts
    rules:
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Memory Usage"
          description: "RAM above 85%. Value {{ $value | printf \"%.1f\" }}%"

  - name: disk_alerts
    rules:
      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low Disk Space"
          description: "Disk above 80%. Value {{ $value | printf \"%.1f\" }}%"
