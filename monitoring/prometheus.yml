global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'anand-portfolio-monitor'

scrape_configs:

  # ── Prometheus itself ──────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ── Node Exporter (EC2 server metrics) ────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          instance: 'aws-ec2'

  # ── cAdvisor (Docker container metrics) ───────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          instance: 'docker-host'
